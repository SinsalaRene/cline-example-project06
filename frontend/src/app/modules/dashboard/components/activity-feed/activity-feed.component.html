<div class="activity-feed">
  <div class="panel-header">
    <h3>Activity Feed</h3>
    <span class="activity-count">{{ activities?.length || 0 }} events</span>
  </div>

  <div class="activity-list" *ngIf="activities && activities.length > 0">
    <div class="activity-item" *ngFor="let activity of activities">
      <div class="activity-indicator">
        <mat-icon
          class="activity-icon"
          [style.color]="getActivityTypeColor(activity.type)"
        >
          {{ getActivityIcon?.(activity.type) || "info" }}
        </mat-icon>
      </div>

      <div class="activity-content">
        <div class="activity-message">{{ activity.message }}</div>
        <div class="activity-meta">
          <span class="activity-source">{{ activity.source }}</span>
          <span class="activity-time">{{
            getRelativeTime(activity.timestamp)
          }}</span>
        </div>
      </div>
    </div>
  </div>

  <div class="activity-empty" *ngIf="!activities || activities.length === 0">
    <mat-icon>inbox</mat-icon>
    <p>No activity to display</p>
  </div>
</div>
