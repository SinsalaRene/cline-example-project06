<div class="chart-widget" *ngIf="chartData && chartData.length > 0">
  <div class="chart-header">
    <h3 class="chart-title">{{ chartTitle }}</h3>
  </div>

  <div class="chart-container" *ngIf="chartType === 'bar'">
    <div class="bar-chart">
      <div class="bar-item" *ngFor="let item of chartData; let i = index">
        <div
          class="bar-fill"
          [style.height.%]="getBarHeight(item.value, chartData)"
        >
          <span class="bar-value">{{ item.value }}</span>
        </div>
        <div class="bar-label">{{ item.label }}</div>
      </div>
    </div>
  </div>

  <div class="chart-container" *ngIf="chartType === 'line'">
    <svg
      class="line-chart-svg"
      viewBox="0 0 500 200"
      preserveAspectRatio="none"
    >
      <polyline
        fill="none"
        [attr.stroke]="chartColor"
        stroke-width="2"
        [attr.points]="getLinePoints(chartData)"
      />
      <polygon
        [attr.fill]="chartColor"
        fill-opacity="0.1"
        [attr.points]="getLineFillPoints(chartData)"
      />
      <circle
        *ngFor="let item of chartData; let i = index"
        [attr.cx]="getPointX(i, chartData.length)"
        [attr.cy]="getPointY(item.value, chartData)"
        r="4"
        [attr.fill]="chartColor"
      />
    </svg>
  </div>

  <div class="chart-container" *ngIf="chartType === 'doughnut'">
    <div class="doughnut-chart">
      <svg viewBox="0 0 200 200" class="doughnut-svg">
        <g transform="translate(100, 100)">
          <circle
            *ngFor="let item of chartData; let i = index"
            cx="0"
            cy="0"
            r="80"
            fill="none"
            [attr.stroke]="getDoughnutColor(i, chartData.length)"
            stroke-width="30"
            [attr.stroke-dasharray]="getDoughnutDash(item.value, chartData)"
            [attr.stroke-dashoffset]="getDoughnutOffset(i, chartData)"
            transform="rotate(-90)"
          />
        </g>
        <text x="100" y="95" text-anchor="middle" class="doughnut-center-label">
          Total
        </text>
        <text x="100" y="115" class="doughnut-center-value">
          {{ getTotalValue(chartData) }}
        </text>
      </svg>
      <div class="doughnut-legend">
        <div *ngFor="let item of chartData; let i = index" class="legend-item">
          <span
            class="legend-color"
            style="background-color: {{
              getDoughnutColor(i, chartData.length)
            }}"
          ></span>
          <span class="legend-label">{{ item.label }}</span>
          <span class="legend-value">{{ item.value }}</span>
        </div>
      </div>
    </div>
  </div>

  <div class="chart-values" *ngIf="chartType !== 'doughnut'">
    <div *ngFor="let item of chartData" class="value-item">
      <span class="value-label">{{ item.label }}</span>
      <span class="value-number">{{ item.value }}</span>
    </div>
  </div>
</div>
