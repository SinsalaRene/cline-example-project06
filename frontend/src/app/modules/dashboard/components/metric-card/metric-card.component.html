<div class="metric-card" [style.borderLeftColor]="stat?.color">
  <div class="metric-header">
    <div class="metric-icon" [style.backgroundColor]="stat?.color + '20'">
      <mat-icon>{{ stat?.icon }}</mat-icon>
    </div>
    <div class="metric-trend" *ngIf="trendIcon">
      <mat-icon class="trend-icon" [style.color]="trendColor">{{
        trendIcon
      }}</mat-icon>
    </div>
  </div>

  <div class="metric-content">
    <div class="metric-label">{{ stat?.title }}</div>
    <div class="metric-value">
      <span class="value-number">{{ stat?.value | number: "1.2-2" }}</span>
      <span class="value-unit">{{ stat?.unit }}</span>
    </div>
    <div class="metric-description">{{ stat?.description }}</div>
    <div class="metric-percentage">
      <div class="percentage-bar">
        <div
          class="percentage-fill"
          [style.width.%]="stat?.percentage"
          [style.backgroundColor]="stat?.color"
        ></div>
      </div>
      <span class="percentage-text">{{ stat?.percentage }}%</span>
    </div>
  </div>
</div>
