<div class="login-container">
  <div class="login-card mat-elevation-z8">
    <!-- Header -->
    <div class="login-header">
      <h1>Microsoft Azure Firewall Manager</h1>
      <p>Sign in to your account</p>
    </div>

    <!-- Login Form -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">

      <!-- Email Field -->
      <mat-form-field class="full-width">
        <mat-label>Email address</mat-label>
        <input
          matInput
          type="email"
          autocomplete="email"
          placeholder="user@company.com"
          formControlName="username"
        />
        <mat-icon matPrefix>email</mat-icon>
        <mat-error *ngIf="loginForm.get('username')?.hasError('required')">
          Email is required
        </mat-error>
        <mat-error *ngIf="loginForm.get('username')?.hasError('email')">
          Please enter a valid email address
        </mat-error>
      </mat-form-field>

      <!-- Password Field -->
      <mat-form-field class="full-width">
        <mat-label>Password</mat-label>
        <input
          matInput
          [type]="showPassword ? 'text' : 'password'"
          autocomplete="current-password"
          placeholder="Enter your password"
          formControlName="password"
        />
        <button
          mat-icon-button
          matSuffix
          type="button"
          (click)="togglePasswordVisibility()"
          [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
        >
          <mat-icon>
            {{ showPassword ? 'visibility_off' : 'visibility' }}
          </mat-icon>
        </button>
        <mat-error *ngIf="loginForm.get('password')?.hasError('required')">
          Password is required
        </mat-error>
      </mat-form-field>

      <!-- Error Message (conditional styling by type) -->
      <div
        class="error-message"
        [class]="getErrorMessageClass()"
        *ngIf="showError"
      >
        <mat-icon>{{ getErrorIcon() }}</mat-icon>
        <span>{{ errorMessage }}</span>
      </div>

      <!-- Submit Button -->
      <button
        mat-raised-button
        color="primary"
        type="submit"
        [disabled]="loginForm.invalid || isLoading"
        class="full-width login-button"
      >
        <span *ngIf="!isLoading">Sign In</span>
        <mat-spinner
          *ngIf="isLoading"
          diameter="20"
          class="spinner"
        ></mat-spinner>
      </button>

      <!-- Azure AD SSO Button -->
      <button
        mat-outlined-button
        class="full-width azure-btn"
        (click)="onAzureLogin()"
        type="button"
        [disabled]="isLoading"
      >
        <mat-icon>account_circle</mat-icon>
        <span>Sign in with Microsoft</span>
      </button>
    </form>

    <!-- Footer -->
    <div class="login-footer">
      <p>Powered by <strong>Microsoft Azure</strong></p>
    </div>
  </div>
</div>
