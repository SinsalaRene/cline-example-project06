<div class="workloads-container">
  <div class="workloads-header">
    <h1>Workloads</h1>
    <div class="header-actions">
      <button
        mat-raised-button
        color="primary"
        (click)="createWorkload()"
        *ngIf="true"
      >
        <mat-icon>add</mat-icon>
        New Workload
      </button>
    </div>
  </div>

  <div class="filters-section">
    <mat-form-field appearance="outline">
      <mat-label>Search</mat-label>
      <input
        matInput
        (keyup)="applyFilter()"
        [(ngModel)]="searchFilter"
        placeholder="Search workloads..."
      />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Status</mat-label>
      <mat-select [(ngModel)]="statusFilter" (selectionChange)="applyFilter()">
        <mat-option value="">All</mat-option>
        <mat-option value="active">Active</mat-option>
        <mat-option value="pending">Pending</mat-option>
        <mat-option value="inactive">Inactive</mat-option>
        <mat-option value="deleted">Deleted</mat-option>
      </mat-select>
    </mat-form-field>

    <button
      mat-raised-button
      color="warn"
      (click)="deleteSelected()"
      *ngIf="selection.size > 0"
    >
      <mat-icon>delete</mat-icon>
      Delete Selected ({{ selection.size }})
    </button>
  </div>

  <div class="table-container" *ngIf="!isLoading">
    <table mat-table [dataSource]="dataSource" matSort mat-checkbox-selection>
      <!-- Select Column -->
      <ng-container matColumnDef="select">
        <th mat-header-cell *matHeaderCellDef>
          <mat-checkbox
            (change)="selectAll($event.checked)"
            [checked]="selection.size === displayedColumns.length"
            [indeterminate]="
              selection.size > 0 && selection.size < displayedColumns.length
            "
          >
          </mat-checkbox>
        </th>
        <td mat-cell *matCellDef="let row">
          <mat-checkbox
            (click)="$event.stopPropagation()"
            (change)="toggleSelection(row.id)"
            [checked]="isSelected(row.id)"
          >
          </mat-checkbox>
        </td>
      </ng-container>

      <!-- Name Column -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Workload Name</th>
        <td mat-cell *matCellDef="let item">
          <a [routerLink]="['/workloads', item.id]" class="workload-name">{{
            item.name
          }}</a>
        </td>
      </ng-container>

      <!-- Type Column -->
      <ng-container matColumnDef="workload_type">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Type</th>
        <td mat-cell *matCellDef="let item">
          <span class="type-badge">{{ item.workload_type }}</span>
        </td>
      </ng-container>

      <!-- Environment Column -->
      <ng-container matColumnDef="environment">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Environment</th>
        <td mat-cell *matCellDef="let item">
          <span class="env-badge env-{{ item.environment }}">{{
            item.environment
          }}</span>
        </td>
      </ng-container>

      <!-- Status Column -->
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Status</th>
        <td mat-cell *matCellDef="let item">
          <span class="status-badge status-{{ item.status }}">{{
            item.status
          }}</span>
        </td>
      </ng-container>

      <!-- Rule Count Column -->
      <ng-container matColumnDef="rule_count">
        <th mat-header-cell *matHeaderCellDef>Rules</th>
        <td mat-cell *matCellDef="let item">
          {{ item.rule_count ?? 0 }}
        </td>
      </ng-container>

      <!-- Owner Column -->
      <ng-container matColumnDef="owner">
        <th mat-header-cell *matHeaderCellDef>Owner</th>
        <td mat-cell *matCellDef="let item">
          {{ item.owner || "-" }}
        </td>
      </ng-container>

      <!-- Actions Column -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let item">
          <button
            mat-icon-button
            color="primary"
            (click)="editWorkload(item.id)"
            title="Edit"
          >
            <mat-icon>edit</mat-icon>
          </button>
          <button
            mat-icon-button
            color="accent"
            (click)="viewWorkload(item.id)"
            title="View Details"
          >
            <mat-icon>visibility</mat-icon>
          </button>
          <button
            mat-icon-button
            color="warn"
            (click)="deleteSingle(item.id, item.name)"
            title="Delete"
          >
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>

    <mat-paginator
      [pageSizeOptions]="[10, 25, 50, 100]"
      showFirstLastButtons
      (page)="onPageChange($event)"
    >
    </mat-paginator>
  </div>

  <div class="loading-container" *ngIf="isLoading">
    <mat-progress-spinner
      mode="indeterminate"
      [diameter]="50"
    ></mat-progress-spinner>
    <p>Loading workloads...</p>
  </div>

  <div class="empty-state" *ngIf="!isLoading && dataSource.data.length === 0">
    <p>No workloads found.</p>
    <button mat-raised-button color="primary" (click)="createWorkload()">
      Create Workload
    </button>
  </div>
</div>
