# Alembic configuration for the Azure Firewall Management application
# For more information, see the Alembic documentation:
# https://alembic.sqlalchemy.org/

[alembic]
# Path to migration scripts
script_location = alembic

# Template used to generate migration file names
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)s:%(name)s:%(message)s

# Database URL - override this with your actual database URL
# For development (SQLite):
sqlalchemy.url = sqlite:///./firewall_mgmt.db

# For production (PostgreSQL):
# sqlalchemy.url = postgresql+psycopg2://user:password@localhost:5432/firewall_mgmt